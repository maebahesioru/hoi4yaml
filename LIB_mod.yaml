mod:
  name: Liberia Expanded
  version: "1.0"
  supported_version: "1.14.*"

# ── National Focus Tree ────────────────────────────────────
national_focus:
  - _file: LIB_focuses
    focus_tree:
      id: LIB_focus_tree
      country:
        factor: 0
        modifier:
          add: 10
          tag: LIB
      default: no

      focus:
        # Root
        - id: LIB_lone_star
          x: 6
          y: 0
          cost: 5
          reward:
            add_political_power: 50
            add_ideas: LIB_spirit_lone_star

        # === Economic Branch ===
        - id: LIB_firestone_question
          x: 2
          y: 1
          prereq: LIB_lone_star
          cost: 10
          reward:
            country_event: { id: LIB.1 }

        - id: LIB_rubber_boom
          x: 0
          y: 2
          prereq: LIB_firestone_question
          cost: 10
          reward:
            add_state_building:
              state: Liberia
              type: industrial_complex
              level: 1
            add_resource:
              type: rubber
              amount: 3

        - id: LIB_american_ties
          x: 2
          y: 2
          prereq: LIB_firestone_question
          cost: 10
          reward:
            add_opinion_modifier:
              target: USA
              modifier: LIB_american_friendship
            add_political_power: 50

        - id: LIB_modernize_economy
          x: 1
          y: 3
          prereq_or: [LIB_rubber_boom, LIB_american_ties]
          cost: 10
          reward:
            add_ideas: LIB_spirit_modernization
            add_political_power: 25

        # === Military Branch ===
        - id: LIB_reform_military
          x: 6
          y: 1
          prereq: LIB_lone_star
          cost: 10
          reward:
            add_ideas: LIB_spirit_military_reform
            army_experience: 25

        - id: LIB_frontier_force
          x: 5
          y: 2
          prereq: LIB_reform_military
          cost: 10
          reward:
            add_tech_bonus:
              name: LIB_infantry_bonus
              bonus: 0.5
              uses: 1
              category: infantry_weapons

        - id: LIB_coastal_defense
          x: 7
          y: 2
          prereq: LIB_reform_military
          cost: 10
          reward:
            add_state_building:
              state: Liberia
              type: coastal_bunker
              level: 2
            add_tech_bonus:
              name: LIB_naval_bonus
              bonus: 0.5
              uses: 1
              category: naval_equipment

        # === Pan-African Branch ===
        - id: LIB_voice_of_africa
          x: 10
          y: 1
          prereq: LIB_lone_star
          cost: 10
          reward:
            add_political_power: 75
            add_ideas: LIB_spirit_pan_africa

        - id: LIB_african_brotherhood
          x: 9
          y: 2
          prereq: LIB_voice_of_africa
          cost: 10
          reward:
            add_opinion_modifier:
              - target: ethiopia
                modifier: LIB_african_solidarity
              - target: SAF
                modifier: LIB_african_solidarity

        - id: LIB_beacon_of_freedom
          x: 11
          y: 2
          prereq: LIB_voice_of_africa
          cost: 10
          reward:
            add_ideas: LIB_spirit_beacon_freedom
            add_political_power: 50

        # === Political Reform Branch ===
        - id: LIB_political_reform
          x: 4
          y: 1
          prereq: LIB_lone_star
          cost: 10
          reward:
            country_event: { id: LIB.3 }

        - id: LIB_unification_policy
          x: 3
          y: 2
          prereq: LIB_political_reform
          cost: 10
          reward:
            remove_ideas: LIB_spirit_americo_liberian_elite
            add_ideas: LIB_spirit_national_unity
            add_stability: 0.05

        - id: LIB_consolidate_power
          x: 5
          y: 2
          prereq: LIB_political_reform
          cost: 10
          reward:
            add_ideas: LIB_spirit_strong_executive
            add_political_power: 100

        - id: LIB_true_democracy
          x: 3
          y: 3
          prereq: LIB_unification_policy
          cost: 10
          reward:
            add_stability: 0.1
            add_war_support: 0.05
            add_ideas: LIB_spirit_peoples_republic

        # === Foreign Policy Branch ===
        - id: LIB_league_of_nations
          x: 8
          y: 1
          prereq: LIB_lone_star
          cost: 10
          reward:
            add_political_power: 50
            country_event: { id: LIB.5 }

        - id: LIB_appeal_to_league
          x: 7
          y: 2
          prereq: LIB_league_of_nations
          cost: 10
          reward:
            add_ideas: LIB_spirit_league_member
            add_political_power: 25

        - id: LIB_armed_neutrality
          x: 9
          y: 2
          prereq: LIB_league_of_nations
          cost: 10
          reward:
            add_ideas: LIB_spirit_armed_neutrality
            add_war_support: 0.1

        - id: LIB_west_african_solidarity
          x: 8
          y: 3
          prereq_or: [LIB_appeal_to_league, LIB_armed_neutrality]
          cost: 10
          reward:
            country_event: { id: LIB.6 }
            add_political_power: 50

# ── Ideas / National Spirits ───────────────────────────────
ideas:
  - _file: LIB_ideas
    _category: country

    LIB_spirit_firestone_concession:
