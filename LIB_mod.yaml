      modifier:
        political_power_gain: -0.1

    LIB_spirit_americo_liberian_elite:
      picture: generic_political_discourse
      cost: 0
      removal_cost: 0
      modifier:
        stability_factor: -0.05
        political_power_gain: -0.05

    LIB_spirit_lone_star:
      picture: generic_pp_unity_bonus
      cost: 0
      removal_cost: -1
      modifier:
        stability_factor: 0.05
        political_power_gain: 0.1

    LIB_spirit_modernization:
      picture: generic_production_bonus
      cost: 0
      removal_cost: -1
      modifier:
        industrial_capacity_factory: 0.1
        production_speed_buildings_factor: 0.05

    LIB_spirit_military_reform:
      picture: generic_army_bonus
      cost: 0
      removal_cost: -1
      modifier:
        army_org_factor: 0.05
        training_time_factor: -0.1

    LIB_spirit_pan_africa:
      picture: generic_democratic_drift_bonus
      cost: 0
      removal_cost: -1
      modifier:
        political_power_gain: 0.15
        stability_factor: 0.05

    LIB_spirit_beacon_freedom:
      picture: generic_volunteer_expedition_bonus
      cost: 0
      removal_cost: -1
      modifier:
        stability_factor: 0.1
        war_support_factor: 0.05

    LIB_spirit_national_unity:
      picture: generic_pp_unity_bonus
      cost: 0
      removal_cost: -1
      modifier:
        stability_factor: 0.1
        political_power_gain: 0.05
        conscription: 0.01

    LIB_spirit_strong_executive:
      picture: generic_fascism_drift_bonus
      cost: 0
      removal_cost: -1
      modifier:
        political_power_gain: 0.2
        stability_factor: -0.05

    LIB_spirit_peoples_republic:
      picture: generic_democratic_drift_bonus
      cost: 0
      removal_cost: -1
      modifier:
        stability_factor: 0.15
        war_support_factor: 0.1
        conscription: 0.02

    LIB_spirit_league_member:
      picture: generic_foreign_capital
      cost: 0
      removal_cost: -1
      modifier:
        political_power_gain: 0.1
        stability_factor: 0.05

    LIB_spirit_armed_neutrality:
      picture: generic_army_bonus
      cost: 0
      removal_cost: -1
      modifier:
        war_support_factor: 0.1
        army_defence_factor: 0.05
        army_attack_factor: -0.05

# ── Characters ─────────────────────────────────────────────
characters:
  - _file: LIB_characters
    _wrap: characters

    LIB_edwin_barclay:
      name: "Edwin Barclay"
      portraits:
        civilian:
          large: GFX_portrait_LIB_edwin_barclay
      country_leader:
        ideology: democratic
        traits: [cautious_arbiter]
        desc: LIB_edwin_barclay_desc

    LIB_william_tubman:
      name: "William Tubman"
      portraits:
        civilian:
          large: GFX_portrait_LIB_william_tubman
      country_leader:
        ideology: democratic
        traits: [moderate_reformist]
        desc: LIB_william_tubman_desc

    LIB_daniel_howard:
      name: "Daniel Howard"
      portraits:
        army:
          large: GFX_portrait_LIB_daniel_howard
      field_marshal:
        traits: [old_guard, defensive_doctrine]
        skill: 1
        attack_skill: 1
        defense_skill: 2
        planning_skill: 1
        logistics_skill: 1
        desc: LIB_daniel_howard_desc

    LIB_elwood_davis:
      name: "Elwood Davis"
      portraits:
        army:
          large: GFX_portrait_LIB_elwood_davis
      corps_commander:
        traits: [infantry_officer]
        skill: 1
        attack_skill: 1
        defense_skill: 1
        planning_skill: 2
        logistics_skill: 1
        desc: LIB_elwood_davis_desc

# ── Events ─────────────────────────────────────────────────
events:
  - _file: LIB_events
    _namespace: LIB
    country_event:
      - id: LIB.1
        title: LIB.1.t
        desc: LIB.1.d
        picture: GFX_report_event_generic_factory
        is_triggered_only: yes
        option:
          - name: LIB.1.a
            # Nationalize - remove concession, lose US relations
            remove_ideas: LIB_spirit_firestone_concession
            add_political_power: 50
            USA:
              add_opinion_modifier:
                target: LIB
                modifier: LIB_nationalization_anger
          - name: LIB.1.b
            # Keep concession - maintain US ties
            add_political_power: -25
            add_opinion_modifier:
              target: USA
              modifier: LIB_american_friendship

      - id: LIB.2
        title: LIB.2.t
        desc: LIB.2.d
        picture: GFX_report_event_generic_read_write
        mean_time_to_happen:
          months: 18
        trigger:
          tag: LIB
          has_idea: LIB_spirit_americo_liberian_elite
          "date > 1937.1.1": yes
        option:
          - name: LIB.2.a
            remove_ideas: LIB_spirit_americo_liberian_elite
            add_stability: 0.05
          - name: LIB.2.b
            add_political_power: 25

      - id: LIB.3
        title: LIB.3.t
        desc: LIB.3.d
        picture: GFX_report_event_generic_parliament
        is_triggered_only: yes
        option:
          - name: LIB.3.a
            # Reform path
            hidden:
              set_country_flag: LIB_reform_path
            add_stability: 0.05
          - name: LIB.3.b
            # Consolidation path
            hidden:
              set_country_flag: LIB_consolidation_path
            add_political_power: 50

      - id: LIB.4
        title: LIB.4.t
        desc: LIB.4.d
        picture: GFX_report_event_generic_factory
        mean_time_to_happen:
          months: 24
        trigger:
          tag: LIB
          has_idea: LIB_spirit_modernization
          "date > 1938.1.1": yes
        option:
          - name: LIB.4.a
            add_state_building:
              state: Liberia
              type: industrial_complex
              level: 1
          - name: LIB.4.b
            add_state_building:
              state: Liberia
              type: infrastructure
              level: 1
            add_political_power: 25

      - id: LIB.5
        title: LIB.5.t
        desc: LIB.5.d
        picture: GFX_report_event_generic_sign_treaty1
        is_triggered_only: yes
        option:
          - name: LIB.5.a
            add_political_power: 50
            add_stability: 0.05
          - name: LIB.5.b
            add_war_support: 0.1
            add_political_power: 25

      - id: LIB.6
        title: LIB.6.t
        desc: LIB.6.d
        picture: GFX_report_event_generic_conference
        is_triggered_only: yes
        option:
          - name: LIB.6.a
            add_opinion_modifier:
              - target: ethiopia
                modifier: LIB_african_solidarity
              - target: SAF
                modifier: LIB_african_solidarity
            add_political_power: 50
          - name: LIB.6.b
            add_stability: 0.05

# ── Decisions ──────────────────────────────────────────────
decisions:
  - _file: LIB_decisions
    LIB_decisions:
      LIB_recruit_indigenous_soldiers:
        icon: generic_army_support
        cost: 50
        days_remove: 60
        available:
          tag: LIB
          has_manpower: 1000
        modifier:
          conscription: 0.01
        complete_effect:
          army_experience: 10
          add_manpower: -1000

      LIB_rubber_export_deal:
        icon: generic_industry
        cost: 75
        days_remove: 90
        available:
          tag: LIB
          has_idea: LIB_spirit_firestone_concession
        modifier:
          consumer_goods_factor: -0.05
        complete_effect:
          add_political_power: 50
          add_opinion_modifier:
            target: USA
            modifier: LIB_american_friendship

      LIB_build_monrovia_port:
        icon: generic_naval
        cost: 100
        days_remove: 120
        available:
          tag: LIB
          has_political_power: 100
        complete_effect:
          add_state_building:
            state: Liberia
            type: naval_base
            level: 1
          add_political_power: -50

# ── Opinion Modifiers ──────────────────────────────────────
opinion_modifiers:
  - _file: LIB_opinion_modifiers
    _wrap: opinion_modifiers
    LIB_american_friendship:
      value: 30
      decay: 1
      max: 30
    LIB_african_solidarity:
      value: 20
      decay: 1
      max: 20
    LIB_nationalization_anger:
      value: -40
      decay: 1
      min: -40

# ── History ────────────────────────────────────────────────
history_countries:
  - _file: LIB
    capital: 7959
    set_tech:
      - infantry_weapons
      - tech_support
    add_ideas:
      - LIB_spirit_firestone_concession
      - LIB_spirit_americo_liberian_elite
    set_ruling_party: democratic
    recruit_character: LIB_edwin_barclay
    set_country_flag: LIB_has_focus_tree

# ── Localisation ───────────────────────────────────────────
localisation:
  english:
    # Focus tree
    LIB_lone_star: "The Lone Star Republic"
    LIB_lone_star_desc: "Liberia, the Lone Star Republic, stands as a beacon of African independence. We must chart our own course."
    LIB_firestone_question: "The Firestone Question"
    LIB_firestone_question_desc: "The Firestone Rubber Company controls much of our land. We must decide our relationship with this American giant."
    LIB_rubber_boom: "Rubber Boom"
    LIB_rubber_boom_desc: "Expand rubber production to fuel our economy."
    LIB_american_ties: "Strengthen American Ties"
    LIB_american_ties_desc: "Cultivate our historic relationship with the United States."
    LIB_modernize_economy: "Modernize the Economy"
    LIB_modernize_economy_desc: "Invest in infrastructure and industry to bring Liberia into the modern age."
    LIB_reform_military: "Reform the Military"
    LIB_reform_military_desc: "The Liberian Frontier Force needs modernization to defend our nation."
    LIB_frontier_force: "Liberian Frontier Force"
    LIB_frontier_force_desc: "Equip and train our infantry with modern weapons."
    LIB_coastal_defense: "Coastal Defense"
    LIB_coastal_defense_desc: "Fortify our coastline against potential threats."
    LIB_voice_of_africa: "Voice of Africa"
    LIB_voice_of_africa_desc: "Liberia shall speak for all of Africa on the world stage."
    LIB_african_brotherhood: "African Brotherhood"
    LIB_african_brotherhood_desc: "Build solidarity with other African nations."
    LIB_beacon_of_freedom: "Beacon of Freedom"
    LIB_beacon_of_freedom_desc: "Liberia was founded as a land of freedom. Let us inspire the world."

    # National spirits
    LIB_spirit_firestone_concession: "Firestone Concession"
    LIB_spirit_firestone_concession_desc: "The Firestone Rubber Company holds a 99-year lease on one million acres of Liberian land, extracting our resources for American profit."
    LIB_spirit_americo_liberian_elite: "Americo-Liberian Elite"
    LIB_spirit_americo_liberian_elite_desc: "The descendants of freed American slaves dominate Liberian politics, creating tension with the indigenous majority."
    LIB_spirit_lone_star: "Lone Star Spirit"
    LIB_spirit_lone_star_desc: "A renewed sense of national pride drives Liberia forward."
    LIB_spirit_modernization: "Modernization Drive"
    LIB_spirit_modernization_desc: "Investment in industry and infrastructure is transforming the Liberian economy."
    LIB_spirit_military_reform: "Military Reform"
    LIB_spirit_military_reform_desc: "The Liberian Frontier Force is being reorganized and re-equipped."
    LIB_spirit_pan_africa: "Pan-African Vision"
    LIB_spirit_pan_africa_desc: "Liberia positions itself as the champion of African peoples everywhere."
    LIB_spirit_beacon_freedom: "Beacon of Freedom"
    LIB_spirit_beacon_freedom_desc: "Liberia's founding ideals of liberty inspire both its citizens and oppressed peoples worldwide."

    # Opinion modifiers
    LIB_american_friendship: "American Friendship"
    LIB_african_solidarity: "African Solidarity"
    LIB_nationalization_anger: "Nationalization Anger"

    # Characters
    LIB_edwin_barclay: "Edwin Barclay"
    LIB_william_tubman: "William Tubman"
    LIB_daniel_howard: "Daniel Howard"
    LIB_elwood_davis: "Elwood Davis"
    LIB_edwin_barclay_desc: "Edwin Barclay has served as President of Liberia since 1930. A cautious statesman, he navigates the pressures of foreign interests while maintaining Liberian sovereignty."
    LIB_william_tubman_desc: "William Tubman is a rising political figure who advocates for the unification of Americo-Liberians and indigenous Liberians under a single national identity."
    LIB_daniel_howard_desc: "General Daniel Howard is the commander of the Liberian Frontier Force, a veteran officer who has spent his career defending Liberia's borders."
    LIB_elwood_davis_desc: "Colonel Elwood Davis is a capable infantry officer who has modernized training methods within the Liberian Frontier Force."

    # New focuses
    LIB_political_reform: "Political Reform"
    LIB_political_reform_desc: "The political structure of Liberia must evolve. The question is: in which direction?"
    LIB_unification_policy: "Unification Policy"
    LIB_unification_policy_desc: "Bridge the divide between Americo-Liberians and indigenous Liberians to forge a unified nation."
    LIB_consolidate_power: "Consolidate Executive Power"
    LIB_consolidate_power_desc: "Strengthen the presidency to push through necessary reforms without obstruction."
    LIB_true_democracy: "True Democracy"
    LIB_true_democracy_desc: "Extend full democratic rights to all Liberians regardless of origin."
    LIB_league_of_nations: "League of Nations"
    LIB_league_of_nations_desc: "Liberia is a founding member of the League of Nations. We must decide how to leverage this membership."
    LIB_appeal_to_league: "Appeal to the League"
    LIB_appeal_to_league_desc: "Use the League of Nations as a platform to protect Liberian sovereignty and advocate for African rights."
    LIB_armed_neutrality: "Armed Neutrality"
    LIB_armed_neutrality_desc: "Liberia will remain neutral in the coming conflicts, but will be prepared to defend itself."
    LIB_west_african_solidarity: "West African Solidarity"
    LIB_west_african_solidarity_desc: "Build a network of mutual support among West African peoples."

    # New national spirits
    LIB_spirit_national_unity: "National Unity"
    LIB_spirit_national_unity_desc: "The barriers between Americo-Liberians and indigenous Liberians are being dismantled, forging a stronger national identity."
    LIB_spirit_strong_executive: "Strong Executive"
    LIB_spirit_strong_executive_desc: "The President holds firm control over the government, enabling swift decision-making."
    LIB_spirit_peoples_republic: "People's Republic"
    LIB_spirit_peoples_republic_desc: "Liberia has become a true democracy, with all citizens participating in governance."
    LIB_spirit_league_member: "League of Nations Member"
    LIB_spirit_league_member_desc: "Liberia's active participation in the League of Nations lends it international legitimacy."
    LIB_spirit_armed_neutrality: "Armed Neutrality"
    LIB_spirit_armed_neutrality_desc: "Liberia will not seek war, but will be ready to defend its territory."

    # New events
    LIB.3.t: "The Path Forward"
    LIB.3.d: "The political reform initiative has begun. Two factions have emerged: those who wish to unify all Liberians under equal rights, and those who prefer to consolidate executive authority to drive change from the top."
    LIB.3.a: "We must bring all Liberians together."
    LIB.3.b: "Strong leadership is what Liberia needs."
    LIB.4.t: "Industrial Opportunity"
    LIB.4.d: "Foreign investors have expressed interest in Liberia's modernization drive. We can direct this investment toward expanding our industrial capacity or improving our infrastructure."
    LIB.4.a: "Build new factories."
    LIB.4.b: "Improve our roads and railways."
    LIB.5.t: "The League and Liberia"
    LIB.5.d: "The League of Nations has acknowledged Liberia's position. We can use this moment to strengthen our diplomatic standing or to rally support for our defense."
    LIB.5.a: "Strengthen our diplomatic position."
    LIB.5.b: "Rally support for our defense."
    LIB.6.t: "West African Conference"
    LIB.6.d: "Representatives from across West Africa have gathered in Monrovia. This is an opportunity to build lasting bonds of solidarity."
    LIB.6.a: "Sign the solidarity pact."
    LIB.6.b: "Observe and maintain independence."

    # Decisions
    LIB_recruit_indigenous_soldiers: "Recruit Indigenous Soldiers"
    LIB_recruit_indigenous_soldiers_desc: "Expand the Liberian Frontier Force by recruiting from the indigenous population."
    LIB_rubber_export_deal: "Negotiate Rubber Export Deal"
    LIB_rubber_export_deal_desc: "Negotiate favorable terms for rubber exports to improve our economic position."
    LIB_build_monrovia_port: "Expand Monrovia Port"
    LIB_build_monrovia_port_desc: "Invest in expanding the port of Monrovia to improve our naval capabilities and trade."

    # Events
    LIB.1.t: "The Firestone Question"
    LIB.1.d: "The Firestone Rubber Company's concession has long been a source of controversy. Some argue it is economic exploitation; others see it as vital investment. The time has come to decide our stance."
    LIB.1.a: "Nationalize the concession!"
    LIB.1.b: "The concession benefits Liberia. Keep it."
    LIB.2.t: "Calls for Political Reform"
    LIB.2.d: "Indigenous Liberians are growing increasingly vocal about their exclusion from political power. The Americo-Liberian elite must respond."
    LIB.2.a: "Extend political rights to all Liberians."
    LIB.2.b: "Maintain the current political order."

  japanese:
    # フォーカスツリー
    LIB_lone_star: "孤星共和国"
    LIB_lone_star_desc: "リベリア、孤星共和国はアフリカ独立の象徴として立つ。我々は自らの道を切り開かなければならない。"
    LIB_firestone_question: "ファイアストーン問題"
    LIB_firestone_question_desc: "ファイアストーン・ゴム会社が我が国の土地の多くを支配している。このアメリカの巨人との関係を決断しなければならない。"
    LIB_rubber_boom: "ゴム景気"
    LIB_rubber_boom_desc: "経済を活性化するためにゴム生産を拡大する。"
    LIB_american_ties: "米国との絆を強化"
    LIB_american_ties_desc: "米国との歴史的な関係を育む。"
    LIB_modernize_economy: "経済の近代化"
    LIB_modernize_economy_desc: "インフラと産業に投資し、リベリアを現代へと導く。"
    LIB_reform_military: "軍の改革"
    LIB_reform_military_desc: "リベリア辺境軍は国を守るために近代化が必要だ。"
    LIB_frontier_force: "リベリア辺境軍"
    LIB_frontier_force_desc: "歩兵を近代的な武器で装備・訓練する。"
    LIB_coastal_defense: "沿岸防衛"
    LIB_coastal_defense_desc: "潜在的な脅威に備えて海岸線を要塞化する。"
    LIB_voice_of_africa: "アフリカの声"
    LIB_voice_of_africa_desc: "リベリアは世界の舞台でアフリカ全体の代弁者となる。"
    LIB_african_brotherhood: "アフリカの兄弟愛"
